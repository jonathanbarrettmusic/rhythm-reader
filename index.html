<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Reader</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
  }

  .container { max-width: 800px; width: 100%; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Menu ── */
  .menu { text-align: center; padding: 40px 20px; }

  h1 {
    font-size: 2.4rem;
    font-weight: 800;
    color: #60a5fa;
    margin-bottom: 6px;
  }
  .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 1.05rem; }

  .section-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin: 0 0 12px;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .choice-btn {
    padding: 14px 18px;
    border: 2px solid #334155;
    background: #1e293b;
    color: #cbd5e1;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    text-align: left;
  }
  .choice-btn:hover { border-color: #60a5fa; color: #e2e8f0; }
  .choice-btn.selected {
    border-color: #60a5fa;
    background: #1e40af;
    color: #fff;
  }

  .choice-btn .btn-icon { font-size: 1.3rem; margin-right: 6px; }
  .choice-btn .btn-sub { display: block; font-size: 0.75rem; font-weight: 400; color: #94a3b8; margin-top: 2px; }
  .choice-btn.selected .btn-sub { color: #bfdbfe; }

  .start-btn {
    padding: 14px 40px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    margin-top: 8px;
  }
  .start-btn:hover { background: #1d4ed8; }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Game screen ── */
  .game-card {
    background: #1e293b;
    border-radius: 14px;
    padding: 24px;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .game-title { font-weight: 700; font-size: 1.1rem; color: #e2e8f0; }
  .game-meta { font-size: 0.85rem; color: #64748b; }

  .back-btn {
    background: transparent;
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .back-btn:hover { border-color: #60a5fa; color: #60a5fa; }

  /* Beat dots */
  .beat-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 0 0 18px;
  }
  .beat-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #334155;
    transition: background 0.08s, transform 0.08s;
  }
  .beat-dot.on { background: #fbbf24; transform: scale(1.5); }
  .beat-dot.accent { background: #f97316; }

  /* Countdown */
  .countdown-display {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 800;
    color: #fbbf24;
    height: 2.2rem;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  /* Staff */
  .staff-wrap {
    background: #fff;
    border-radius: 10px;
    padding: 0 16px 8px;
    margin: 0 0 18px;
    position: relative;
    overflow: hidden;
    min-height: 120px;
  }
  .staff-wrap svg { display: block; }

  /* Playhead cursor */
  .playhead {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: rgba(239,68,68,0.7);
    pointer-events: none;
    display: none;
  }

  /* Status message */
  .status-msg {
    text-align: center;
    font-size: 0.9rem;
    color: #64748b;
    min-height: 1.4rem;
    margin-bottom: 14px;
  }
  .status-msg.active-msg { color: #60a5fa; }
  .status-msg.error-msg { color: #f87171; }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .act-btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .act-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .act-btn.primary { background: #2563eb; color: #fff; }
  .act-btn.primary:hover:not(:disabled) { background: #1d4ed8; }
  .act-btn.secondary { background: #0f766e; color: #fff; }
  .act-btn.secondary:hover:not(:disabled) { background: #0d6563; }
  .act-btn.ghost { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
  .act-btn.ghost:hover:not(:disabled) { border-color: #60a5fa; color: #60a5fa; }

  /* Tap button */
  .tap-btn {
    display: block;
    width: 100%;
    padding: 52px 20px;
    background: #0369a1;
    color: #fff;
    font-size: 1.4rem;
    font-weight: 800;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    letter-spacing: 0.05em;
    transition: background 0.08s, transform 0.08s;
  }
  .tap-btn:active, .tap-btn.flash { background: #0ea5e9; transform: scale(0.97); }

  /* ── Results ── */
  .results-card {
    background: #1e293b;
    border-radius: 14px;
    padding: 32px;
    text-align: center;
  }
  .results-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; }
  .score-ring {
    font-size: 4rem;
    font-weight: 900;
    color: #60a5fa;
    margin: 12px 0;
    line-height: 1;
  }
  .grade-label { font-size: 1.4rem; margin: 8px 0 20px; }
  .result-stats { color: #64748b; font-size: 0.9rem; margin: 8px 0; }

  .notes-feedback {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 20px 0;
  }
  .note-pip {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .note-pip.perfect { background: #166534; color: #4ade80; }
  .note-pip.good    { background: #1e3a5f; color: #60a5fa; }
  .note-pip.late    { background: #713f12; color: #fbbf24; }
  .note-pip.miss    { background: #450a0a; color: #f87171; }

  .results-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
<div class="container">

  <!-- ═══ MENU ═══ -->
  <div class="screen active" id="screen-menu">
    <div class="menu">
      <h1>♩ Rhythm Reader</h1>
      <p class="subtitle">Sightread and perform rhythms</p>

      <div class="section-label">Mode</div>
      <div class="btn-grid" id="mode-grid">
        <button class="choice-btn" data-mode="learn" onclick="pickMode(this,'learn')">
          <span class="btn-icon">📖</span>Learn
          <span class="btn-sub">Listen first, then perform</span>
        </button>
        <button class="choice-btn" data-mode="performance" onclick="pickMode(this,'performance')">
          <span class="btn-icon">⚡</span>Performance
          <span class="btn-sub">Sightread straight away</span>
        </button>
      </div>

      <div class="section-label">Level</div>
      <div class="btn-grid" id="level-grid">
        <button class="choice-btn" data-level="1" onclick="pickLevel(this,1)">
          Level 1
          <span class="btn-sub">Quarters &amp; halves</span>
        </button>
        <button class="choice-btn" data-level="2" onclick="pickLevel(this,2)">
          Level 2
          <span class="btn-sub">Eighth notes</span>
        </button>
        <button class="choice-btn" data-level="3" onclick="pickLevel(this,3)">
          Level 3
          <span class="btn-sub">Dotted rhythms</span>
        </button>
        <button class="choice-btn" data-level="4" onclick="pickLevel(this,4)">
          Level 4
          <span class="btn-sub">Syncopation</span>
        </button>
        <button class="choice-btn" data-level="5" onclick="pickLevel(this,5)">
          Level 5
          <span class="btn-sub">Advanced</span>
        </button>
      </div>

      <button class="start-btn" id="start-btn" onclick="goGame()" disabled>Start ▶</button>
    </div>
  </div>

  <!-- ═══ GAME ═══ -->
  <div class="screen" id="screen-game">
    <div class="game-card">
      <div class="game-header">
        <div>
          <div class="game-title" id="game-title">Rhythm Reader</div>
          <div class="game-meta" id="game-meta">Level 1 · Learn Mode · ♩=80</div>
        </div>
        <button class="back-btn" onclick="goMenu()">← Menu</button>
      </div>

      <div class="countdown-display" id="countdown"></div>
      <div class="beat-row" id="beat-row"></div>

      <div class="staff-wrap" id="staff-wrap">
        <div class="playhead" id="playhead"></div>
      </div>

      <div class="status-msg" id="status"></div>

      <div class="action-row">
        <button class="act-btn secondary" id="btn-listen" onclick="doListen()" style="display:none">🔊 Listen</button>
        <button class="act-btn primary"   id="btn-start"  onclick="doStart()">▶ Start</button>
        <button class="act-btn ghost"     id="btn-skip"   onclick="doSkip()"  style="display:none">Skip →</button>
      </div>

      <button class="tap-btn" id="tap-btn" ontouchstart="handleTap()" onmousedown="handleTap()">
        TAP &nbsp;·&nbsp; SPACE
      </button>
    </div>
  </div>

  <!-- ═══ RESULTS ═══ -->
  <div class="screen" id="screen-results">
    <div class="results-card">
      <div class="results-title">Results</div>
      <div class="score-ring" id="r-score">—</div>
      <div class="grade-label" id="r-grade"></div>
      <div class="notes-feedback" id="r-pips"></div>
      <div class="result-stats" id="r-stats"></div>
      <div class="results-actions">
        <button class="act-btn primary" onclick="doRetry()">🔄 Retry</button>
        <button class="act-btn ghost"   onclick="goMenu()">← Menu</button>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
'use strict';
const VF = VexFlow; // CDN exposes window.VexFlow; alias to VF for shorthand

// ─── State ───────────────────────────────────────────────────────────────────
let gs = {
  mode:  null,  // 'learn' | 'performance'
  level: null,  // 1-5
  rhythm: null,
  bpm: 80,
  taps: [],
  noteOnsets: [],   // ms from performance start for each note
  noteXPositions: [],
  performStart: null,
  rafId: null,
  state: 'idle',  // idle | counting | performing | done
};

// ─── Rhythm library ───────────────────────────────────────────────────────────
// Each note is a beat-fraction (quarter=1, eighth=0.5, etc.)
// Rhythms must sum to 4 beats (one bar, 4/4)
const POOLS = {
  1: [
    [1,1,1,1], [2,2], [2,1,1], [1,1,2], [1,3], [3,1],
  ],
  2: [
    [0.5,0.5,1,1,1], [1,0.5,0.5,1,1], [1,1,0.5,0.5,1], [0.5,0.5,0.5,0.5,2],
    [0.5,0.5,2,0.5,0.5], [1,0.5,0.5,0.5,0.5,1],
  ],
  3: [
    [1.5,0.5,2], [2,1.5,0.5], [1.5,0.5,1,1], [1,1.5,0.5,1],
    [1.5,0.5,0.5,0.5,1], [3,0.5,0.5],
  ],
  4: [
    [0.5,1,0.5,1,1], [1,0.5,0.5,2], [0.5,0.5,1,0.5,1,0.5],
    [1,0.5,1,0.5,0.5,0.5], [0.5,1,1,1,0.5],
  ],
  5: [
    [0.25,0.25,0.5,1,1,1], [1,0.5,0.25,0.25,0.5,1.5],
    [0.5,0.25,0.25,1.5,0.5,1], [1.5,0.25,0.25,0.5,1.5],
    [0.25,0.25,0.5,0.5,0.5,0.5,0.5,0.5],
  ],
};

const TEMPO = { 1:60, 2:72, 3:80, 4:88, 5:100 };

// ─── Audio (Web Audio API) ─────────────────────────────────────────────────
let audioCtx = null;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, gain = 0.25) {
  const ac = ctx();
  const osc  = ac.createOscillator();
  const env  = ac.createGain();
  osc.connect(env); env.connect(ac.destination);
  osc.frequency.value = freq;
  const t = ac.currentTime;
  env.gain.setValueAtTime(gain, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t); osc.stop(t + duration + 0.01);
}
const clickHi  = () => playTone(1200, 0.04, 0.35);
const clickLo  = () => playTone(800,  0.04, 0.2);
const demoTone = () => playTone(600,  0.12, 0.3);
const tapTone  = () => playTone(900,  0.04, 0.2);

// ─── VexFlow helpers ──────────────────────────────────────────────────────────
const DUR_MAP = { 0.25:'16', 0.5:'8', 1:'q', 1.5:'qd', 2:'h', 3:'hd', 4:'w' };

function renderRhythm(notes) {
  const wrap = document.getElementById('staff-wrap');
  wrap.innerHTML = '<div class="playhead" id="playhead"></div>';

  try {
    _renderRhythm(wrap, notes);
  } catch(err) {
    console.error('VexFlow render error:', err);
    wrap.innerHTML += `<p style="color:#ef4444;padding:12px;font-size:13px">Render error: ${err.message}</p>`;
  }
}

function _renderRhythm(wrap, notes) {
  const W = wrap.clientWidth - 32 || 600;
  const H = 160;

  const renderer = new VF.Renderer(wrap, VF.Renderer.Backends.SVG);
  renderer.resize(W, H);
  const context = renderer.getContext();

  // Treble clef, all notes on B4 (middle line) — standard rhythm notation
  const stave = new VF.Stave(10, 28, W - 20);
  stave.addClef('treble');
  stave.addTimeSignature('4/4');
  stave.setContext(context).draw();

  const vexNotes = notes.map(dur => {
    const d = DUR_MAP[dur] || 'q';
    return new VF.StaveNote({ keys: ['b/4'], duration: d, autoStem: true });
  });

  // Beam eighth/sixteenth notes
  const beams = VF.Beam.generateBeams(vexNotes);

  // Do NOT chain setStrict — it may not return `this` in VF5
  const voice = new VF.Voice({ numBeats: 4, beatValue: 4 });
  voice.setStrict(false);
  voice.addTickables(vexNotes);

  new VF.Formatter().joinVoices([voice]).formatToStave([voice], stave);
  voice.draw(context, stave);
  beams.forEach(b => b.setContext(context).draw());

  // Store note X positions for playhead sweep
  gs.noteXPositions = vexNotes.map(n => n.getAbsoluteX());
  const last = gs.noteXPositions[gs.noteXPositions.length - 1];
  gs.staffEndX = Math.min(last + 50, W - 10);
}

// ─── Beat visual ──────────────────────────────────────────────────────────────
function buildBeatRow(count) {
  const row = document.getElementById('beat-row');
  row.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot';
    d.id = `bd-${i}`;
    row.appendChild(d);
  }
}
function pulseBeat(i, accent) {
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('on','accent'));
  const el = document.getElementById(`bd-${i}`);
  if (el) el.classList.add(accent ? 'accent' : 'on');
}

// ─── Sleep helper ─────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Menu selection ──────────────────────────────────────────────────────────
function pickMode(btn, mode) {
  gs.mode = mode;
  document.querySelectorAll('#mode-grid .choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateStartBtn();
}
function pickLevel(btn, level) {
  gs.level = level;
  document.querySelectorAll('#level-grid .choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateStartBtn();
}
function updateStartBtn() {
  document.getElementById('start-btn').disabled = !(gs.mode && gs.level);
}

function goMenu() {
  cancelRaf();
  showScreen('menu');
  gs.state = 'idle';
}

// ─── Start game ───────────────────────────────────────────────────────────────
function goGame() {
  if (!gs.mode || !gs.level) return;

  const pool = POOLS[gs.level];
  gs.rhythm = pool[Math.floor(Math.random() * pool.length)];
  gs.bpm    = TEMPO[gs.level];
  gs.taps   = [];
  gs.state  = 'idle';

  // Precompute note onset times (ms from start of performance)
  const beatMs = 60000 / gs.bpm;
  let t = 0;
  gs.noteOnsets = gs.rhythm.map(dur => { const onset = t; t += dur * beatMs; return onset; });
  gs.totalDuration = t; // ms from start to end of last note

  document.getElementById('game-meta').textContent =
    `Level ${gs.level} · ${gs.mode === 'learn' ? 'Learn' : 'Performance'} Mode · ♩=${gs.bpm}`;
  document.getElementById('btn-listen').style.display = gs.mode === 'learn' ? '' : 'none';
  document.getElementById('btn-start').style.display  = '';
  document.getElementById('btn-skip').style.display   = 'none';
  document.getElementById('btn-start').disabled       = false;
  document.getElementById('tap-btn').disabled         = false;
  document.getElementById('status').textContent       = gs.mode === 'learn'
    ? 'Press Listen to hear the rhythm first.'
    : 'Study the rhythm, then press Start.';
  document.getElementById('status').className = 'status-msg';
  document.getElementById('countdown').textContent    = '';

  buildBeatRow(4);
  showScreen('game');
  // Defer one frame so the browser finishes layout before we measure clientWidth
  requestAnimationFrame(() => renderRhythm(gs.rhythm));
}

// ─── Listen (learn mode demo) ─────────────────────────────────────────────────
async function doListen() {
  if (gs.state !== 'idle') return;
  gs.state = 'counting';
  disableControls(true);
  setStatus('Count in…', true);

  const beatMs = 60000 / gs.bpm;

  // 4-beat count-in
  for (let i = 0; i < 4; i++) {
    pulseBeat(i, i === 0);
    document.getElementById('countdown').textContent = i === 0 ? '1' : i === 1 ? '2' : i === 2 ? '3' : '4';
    clickHi();
    await sleep(beatMs);
  }
  document.getElementById('countdown').textContent = '';

  // Demo: play each note with a tone
  gs.state = 'performing';
  setStatus('Listening…', true);
  const demoStart = Date.now();
  for (let i = 0; i < gs.noteOnsets.length; i++) {
    const due = gs.noteOnsets[i] - (Date.now() - demoStart);
    if (due > 0) await sleep(due);
    pulseBeat(Math.floor(gs.noteOnsets[i] / (60000 / gs.bpm)) % 4, false);
    demoTone();
    animatePlayhead(gs.noteOnsets[i], gs.totalDuration);
  }

  await sleep(beatMs);

  gs.state = 'idle';
  disableControls(false);
  document.getElementById('btn-listen').textContent = '🔊 Again';
  setStatus('Now press Start when you\'re ready.', true);
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('on','accent'));
}

// ─── Start performance ────────────────────────────────────────────────────────
async function doStart() {
  if (gs.state !== 'idle') return;
  gs.state = 'counting';
  gs.taps  = [];
  disableControls(true);

  const beatMs = 60000 / gs.bpm;

  // 4-beat count-in
  for (let i = 0; i < 4; i++) {
    pulseBeat(i, i === 0);
    document.getElementById('countdown').textContent = ['1','2','3','Go!'][i];
    i === 0 ? clickHi() : clickLo();
    await sleep(beatMs);
  }
  document.getElementById('countdown').textContent = '';

  // Performance
  gs.state = 'performing';
  document.getElementById('tap-btn').disabled = false;
  setStatus('Tap the rhythm!', true);

  gs.performStart = Date.now();

  // Metronome beats and playhead during performance
  let beatTick = 0;
  const beatInterval = setInterval(() => {
    pulseBeat(beatTick % 4, beatTick % 4 === 0);
    beatTick % 4 === 0 ? clickHi() : clickLo();
    beatTick++;
  }, beatMs);

  // Animate playhead with requestAnimationFrame
  startPlayheadAnim(gs.performStart, gs.totalDuration);

  // Wait for the full rhythm duration + grace window
  await sleep(gs.totalDuration + beatMs * 0.75);

  clearInterval(beatInterval);
  cancelRaf();
  document.getElementById('playhead').style.display = 'none';
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('on','accent'));

  gs.state = 'done';
  showResults();
}

function doSkip() { goMenu(); }

// ─── Playhead animation ───────────────────────────────────────────────────────
function startPlayheadAnim(startMs, totalMs) {
  const ph = document.getElementById('playhead');
  const wrap = document.getElementById('staff-wrap');
  ph.style.display = 'block';

  const startX = gs.noteXPositions[0] || 60;
  const endX   = gs.staffEndX || (wrap.clientWidth - 20);

  function frame() {
    const elapsed = Date.now() - startMs;
    const progress = Math.min(elapsed / totalMs, 1);
    ph.style.left = (startX + (endX - startX) * progress) + 'px';
    if (progress < 1) gs.rafId = requestAnimationFrame(frame);
  }
  gs.rafId = requestAnimationFrame(frame);
}

function animatePlayhead(noteMs, totalMs) {
  const ph = document.getElementById('playhead');
  const wrap = document.getElementById('staff-wrap');
  const startX = gs.noteXPositions[0] || 60;
  const endX   = gs.staffEndX || (wrap.clientWidth - 20);
  const progress = noteMs / totalMs;
  ph.style.display = 'block';
  ph.style.left = (startX + (endX - startX) * progress) + 'px';
}

function cancelRaf() {
  if (gs.rafId) { cancelAnimationFrame(gs.rafId); gs.rafId = null; }
}

// ─── Tap handling ─────────────────────────────────────────────────────────────
function handleTap(e) {
  if (e) e.preventDefault();
  if (gs.state !== 'performing') return;

  tapTone();
  gs.taps.push(Date.now() - gs.performStart);

  const btn = document.getElementById('tap-btn');
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 80);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.getElementById('screen-game').classList.contains('active')) {
    e.preventDefault();
    handleTap(null);
  }
});

// ─── Results ─────────────────────────────────────────────────────────────────
const WINDOW_MS = 150; // ±ms for a tap to count as a hit

function showResults() {
  const { taps, noteOnsets } = gs;
  const used = new Set();
  const results = noteOnsets.map(onset => {
    // Find the closest unused tap within window
    let bestDiff = Infinity, bestIdx = -1;
    taps.forEach((t, i) => {
      if (used.has(i)) return;
      const diff = Math.abs(t - onset);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    });
    if (bestIdx !== -1 && bestDiff <= WINDOW_MS) {
      used.add(bestIdx);
      if (bestDiff <= 50)  return 'perfect';
      if (bestDiff <= 100) return 'good';
      return 'late';
    }
    return 'miss';
  });

  const counts = { perfect: 0, good: 0, late: 0, miss: 0 };
  results.forEach(r => counts[r]++);
  const scored = counts.perfect * 3 + counts.good * 2 + counts.late * 1;
  const maxScore = noteOnsets.length * 3;
  const pct = Math.round(scored / maxScore * 100);

  // Pips
  const pipsEl = document.getElementById('r-pips');
  pipsEl.innerHTML = '';
  const symbols = { perfect:'✓', good:'✓', late:'~', miss:'✗' };
  results.forEach(r => {
    const d = document.createElement('div');
    d.className = `note-pip ${r}`;
    d.textContent = symbols[r];
    pipsEl.appendChild(d);
  });

  document.getElementById('r-score').textContent = `${pct}%`;
  document.getElementById('r-grade').textContent =
    pct === 100 ? '🎉 Perfect!'
    : pct >= 85  ? '✨ Excellent'
    : pct >= 65  ? '👍 Good'
    : pct >= 40  ? '💪 Keep going'
    : '🎵 Try again';
  document.getElementById('r-stats').textContent =
    `${counts.perfect} perfect · ${counts.good} good · ${counts.late} early/late · ${counts.miss} missed`;

  showScreen('results');
}

function doRetry() {
  goGame();
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}
function setStatus(msg, highlight) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-msg' + (highlight ? ' active-msg' : '');
}
function disableControls(disabled) {
  ['btn-listen','btn-start','btn-skip'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
  document.getElementById('tap-btn').disabled = disabled;
}
</script>
